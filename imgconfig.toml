[[pipeline_modules]]
name = "LCH"
lc = 1
cc = 1.3
hc = 1

[[pipeline_modules]]
name = "ToneMap"
# c = 6

[[pipeline_modules]]
name = "CST"
target_color_space = "Srgb"
