[[pipeline_modules]]
name = "CFACoeffs"

[[pipeline_modules]]
name = "HighlightReconstruction"

[[pipeline_modules]]
name = "ChromaDenoise"
intensity = 0.9

[[pipeline_modules]]
name = "Vignette"
strength = 1.0

[[pipeline_modules]]
name = "BaselineExposureCompensation"

[[pipeline_modules]]
name = "Exp"
ev = 1

[[pipeline_modules]]
name = "Contrast"
c = 1.5

[[pipeline_modules]]
name = "CST"
target_color_space = "AcesCg"

